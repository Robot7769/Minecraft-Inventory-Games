# ======================================================
# Cookie Clicker Configuration
# ======================================================
# inventory_size: Velikost inventáře (násobky 9, max 54)
# slots: Definice slotů pro tlačítka v menu
# formating: Nastavení formátování velkých čísel
#   - decimal_places: Počet desetinných míst
#   - thousand, million, etc: Přípony pro dané řády
#
# upgrades / one-time-upgrades:
#   - baseCost: Základní cena
#   - costMultiplier: O kolik se zvýší cena s každou úrovní
#   - cpsPerLevel: Bonus k produkci za sekundu (+1.0 pro přičtení, *1.1 pro násobení)
#   - clickPerLevel: Bonus k produkci za klik (+1.0 pro přičtení, *1.1 pro násobení)
#   - require: Podmínky pro odemčení (zobrazení v obchodě)
#     - cookies: Potřebný počet sušenek
#     - cps: Potřebná produkce za sekundu
#     - cpc: Potřebný výdělek za klik
#     - clicked: Celkový počet kliknutí na sušenku
#     - rebirth: ID rebirth vylepšení, které musí být koupeno
#
# achievements:
#   - require: Stejné jako u vylepšení
#
# rebirth-upgrades:
#   - cost: Cena v Heavenly Chips
#   - require_rebirth: ID jiného rebirth vylepšení, které musí být koupeno jako prerekvizita
# ======================================================

